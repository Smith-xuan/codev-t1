services:

  direct:
    image: __OSS_SIM_IMAGE__
    volumes:
      - ./src/:/src/:ro # Infrastructure location
    working_dir : /code/rundir
    env_file    : ./src/.env
    command     : pytest --log-cli-level=INFO -o cache_dir=/code/rundir/.cache -sv /src/test_runner.py
    # command     : python3 /src/test_runner.py