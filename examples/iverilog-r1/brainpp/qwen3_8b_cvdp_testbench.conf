#!/usr/bin/env bash

_brainpp_config_dir="$(cd -- "$(dirname -- "${BASH_SOURCE[0]}")" &>/dev/null && pwd)"
_brainpp_repo_root="$(cd -- "${_brainpp_config_dir}/../../.." &>/dev/null && pwd)"
_brainpp_repo_name="$(basename -- "${_brainpp_repo_root}")"

: "${LOCAL_REPO_ROOT:=${_brainpp_repo_root}}"
: "${REPO_NAME:=${_brainpp_repo_name}}"

: "${MOUNT_ROOT:=/mnt/i-zhangxiaoyun}"
: "${SYNC_REPO_ROOT:=${MOUNT_ROOT}/${REPO_NAME}}"
: "${CONTAINER_REPO_ROOT:=/workspace/${REPO_NAME}}"
: "${REPO_ROOT:=${CONTAINER_REPO_ROOT}}"
: "${EXAMPLE_DIR:=${REPO_ROOT}/examples/iverilog-r1}"

: "${RUN_NAME:=qwen3_8b_cvdp_testbench}"

: "${DATA_PATH:=${EXAMPLE_DIR}/data/cvdp_testbench_172}"
: "${CODEV_TEST_ROOT:=${EXAMPLE_DIR}/codev_test}"
: "${CVDP_TESTENV_ROOT:=${CODEV_TEST_ROOT}/train_testenv}"
: "${TRAIN_FILE:=train.parquet}"

: "${MODEL_PATH:=${MOUNT_ROOT}/models/qwen3_8b/checkpoint-1270}"
: "${CKPT_BASE:=${MOUNT_ROOT}/results/${REPO_NAME}/checkpoints/qwen3_8b_cvdp_testbench}"
: "${CKPT_SAVE_NAME:=dynamic_curriculum_kl0.0_update2_eval3_lr2e-6}"

: "${NUM_NODES:=2}"
: "${GPUS_PER_NODE:=8}"
: "${ACTOR_NUM_NODES:=1}"
: "${ACTOR_NUM_GPUS_PER_NODE:=8}"
: "${ROLLOUT_NUM_GPUS:=8}"
: "${ROLLOUT_NUM_GPUS_PER_ENGINE:=8}"

: "${MASTER_PORT:=6379}"
: "${RAY_DASHBOARD_PORT:=8265}"
: "${SGLANG_ROUTER_PORT:=3001}"

: "${WANDB_PROJECT:=slime-async-cvdp-train}"
: "${WANDB_GROUP:=cvdp_testbench_reward_qwen3_8b}"
: "${WANDB_MODE:=offline}"
: "${USE_WANDB:=1}"
: "${WANDB_DIR:=${MOUNT_ROOT}/results/${REPO_NAME}/wandb/${RUN_NAME}}"

: "${SHARED_STATE_DIR:=${MOUNT_ROOT}/results/${REPO_NAME}/runtime/${RUN_NAME}}"
: "${HEAD_IP_FILE:=${SHARED_STATE_DIR}/head_ip.txt}"
: "${LOG_ROOT:=${MOUNT_ROOT}/results/${REPO_NAME}/logs/${RUN_NAME}}"
: "${RAY_TMP_ROOT:=/tmp/codev-t1/${RUN_NAME}}"
: "${IVERILOG_TMP_DIR:=/tmp/iverilog_tmp}"

: "${CVDP_PYTEST_PATH:=}"
: "${CVDP_EXTRA_BIN_PATH:=}"
: "${IVERILOG_PATH:=}"
: "${VVP_PATH:=}"
: "${YOSYS_PATH:=}"
: "${MEGATRON_LM_PATH:=}"
: "${SGLANG_GATEWAY_PATH:=}"
: "${SGLANG_PYTHON_PATH:=}"
: "${VERL_PATH:=}"
: "${EXTRA_PYTHONPATH:=}"
: "${ENTRY_ACTIVATE_CMD:=}"

: "${JLAUNCH_IMAGE:=hub.i.basemind.com/diversity/slime:0319}"
: "${JLAUNCH_CPU:=20}"
: "${JLAUNCH_MEMORY_MIB:=614400}"
: "${JLAUNCH_GPU:=${GPUS_PER_NODE}}"
: "${JLAUNCH_GPU_QOS:=guaranteed}"
: "${JLAUNCH_MAX_WAIT_DURATION:=30m0s}"
: "${JLAUNCH_BACKOFF_LIMIT:=1}"
: "${JLAUNCH_CHARGED_GROUP:=}"
: "${JLAUNCH_PRIVATE_MACHINE:=}"
: "${JLAUNCH_POSITIVE_TAGS:=}"
: "${JLAUNCH_NEGATIVE_TAGS:=}"
: "${JLAUNCH_CUSTOM_RESOURCES:=}"
: "${JLAUNCH_MOUNT_SPECS:=juicefs+s3://oss.i.shaipower.com/i-zhangxiaoyun:${MOUNT_ROOT}}"
: "${JLAUNCH_EXTRA_VOLUMES:=}"
: "${JLAUNCH_WORKDIR:=/workspace}"

if [[ -z "${WORKER_REPLICAS:-}" ]]; then
  WORKER_REPLICAS=$(( NUM_NODES > 0 ? NUM_NODES - 1 : 0 ))
fi
